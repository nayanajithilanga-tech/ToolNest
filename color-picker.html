<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Color Picker & Palette Generator - ToolNest</title>
    <meta name="description" content="Pick colors, convert formats (HEX, RGB, HSL), and generate stunning palettes online.">
    <link rel="icon" href="../assets/images/favicon.ico" type="image/x-icon">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../assets/css/style.css">
    <style>
        .color-display {
            width: 100%;
            height: 150px;
            border-radius: 12px;
            background-color: #6366f1;
            margin-bottom: 20px;
            transition: background-color 0.3s ease;
            box-shadow: var(--card-shadow);
        }
        .color-inputs {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            margin-bottom: 20px;
        }
        .color-input-group label {
            display: block;
            margin-bottom: 5px;
            font-weight: 500;
        }
        .color-picker-input {
            width: 100%;
            height: 50px;
            padding: 5px;
            border-radius: 8px;
            cursor: pointer;
        }
    </style>
</head>
<body class="light-mode">
    <header class="navbar glass">
        <div class="container nav-container">
            <a href="../index.html" class="logo">Tool<span>Nest</span></a>
            <nav class="nav-links">
                <a href="../index.html#featured">Featured Tools</a>
            </nav>
            <div class="nav-actions">
                <button id="theme-toggle" aria-label="Toggle Dark Mode">
                    <svg id="moon-icon" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path></svg>
                    <svg id="sun-icon" class="hidden" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="5"></circle><line x1="12" y1="1" x2="12" y2="3"></line><line x1="12" y1="21" x2="12" y2="23"></line></svg>
                </button>
            </div>
        </div>
    </header>

    <div class="page-header">
        <div class="container">
            <h1 class="page-title">Color Picker & Converter</h1>
            <p class="page-desc">Easily select colors and get HEX, RGB, and HSL codes.</p>
        </div>
    </div>

    <div class="container content-container">
        <main class="main-content">
            <div class="tool-box">
                <div class="color-display" id="color-display"></div>
                
                <div class="color-inputs">
                    <div class="color-input-group">
                        <label>Pick Color</label>
                        <input type="color" id="native-picker" class="color-picker-input" value="#6366f1" oninput="updateColors(this.value)">
                    </div>
                    <div class="color-input-group">
                        <label>HEX</label>
                        <input type="text" id="hex-input" value="#6366f1" onchange="updateColors(this.value)">
                    </div>
                    <div class="color-input-group">
                        <label>RGB</label>
                        <input type="text" id="rgb-input" value="rgb(99, 102, 241)" readonly>
                    </div>
                </div>

                <div class="tool-actions">
                    <button class="btn btn-outline" onclick="copyToClipboard(document.getElementById('hex-input').value, this)">Copy HEX</button>
                    <button class="btn btn-outline" onclick="copyToClipboard(document.getElementById('rgb-input').value, this)">Copy RGB</button>
                </div>
            </div>
        </main>
        <aside class="sidebar-ad">
            <div class="ad-placeholder">AdSense Sidebar Ad</div>
        </aside>
    </div>

    <script src="../assets/js/main.js"></script>
    <script>
        function updateColors(hex) {
            document.getElementById('color-display').style.backgroundColor = hex;
            document.getElementById('native-picker').value = hex;
            document.getElementById('hex-input').value = hex.toUpperCase();
            
            // Convert HEX to RGB
            let r = parseInt(hex.slice(1, 3), 16);
            let g = parseInt(hex.slice(3, 5), 16);
            let b = parseInt(hex.slice(5, 7), 16);
            document.getElementById('rgb-input').value = `rgb(${r}, ${g}, ${b})`;
        }
    </script>
</body>
</html>
